<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ABNText — Conversor Markdown → ABNT PDF</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 600px;
      margin: 4rem auto;
      padding: 0 1rem;
      color: #222;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    p.subtitle { color: #666; margin-top: 0; margin-bottom: 2rem; }
    label { display: block; font-weight: 600; margin-bottom: 0.25rem; }
    .field { margin-bottom: 1.5rem; }
    .hint { font-size: 0.85rem; color: #666; margin-top: 0.25rem; }
    input[type="file"] { display: block; margin-top: 0.25rem; }
    button {
      background: #1a56db;
      color: #fff;
      border: none;
      padding: 0.6rem 1.4rem;
      font-size: 1rem;
      border-radius: 4px;
      cursor: pointer;
    }
    button:disabled { background: #93b4f0; cursor: not-allowed; }
    #status { margin-top: 1rem; font-size: 0.95rem; }
    #error { color: #c00; white-space: pre-wrap; font-family: monospace; font-size: 0.85rem; }
  </style>
</head>
<body>
  <h1>ABNText</h1>
  <p class="subtitle">Converta seu artigo Markdown para PDF no formato ABNT/FLAM.</p>

  <form id="form">
    <div class="field">
      <label for="md_file">Arquivo Markdown <span style="color:#c00">*</span></label>
      <input type="file" id="md_file" name="md_file" accept=".md,.markdown" required>
    </div>
    <div class="field">
      <label for="bib_file">Arquivo BibTeX (opcional)</label>
      <input type="file" id="bib_file" name="bib_file" accept=".bib">
      <p class="hint">Necessário se o documento contiver citações <code>[@chave]</code>.</p>
    </div>
    <button type="submit" id="btn">Converter e Baixar PDF</button>
  </form>

  <div id="status"></div>
  <pre id="error"></pre>

  <script>
    const form = document.getElementById('form');
    const btn = document.getElementById('btn');
    const status = document.getElementById('status');
    const errorBox = document.getElementById('error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true;
      status.textContent = 'Convertendo…';
      errorBox.textContent = '';

      const data = new FormData(form);

      try {
        const res = await fetch('/convert', { method: 'POST', body: data });
        if (res.ok) {
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'output.pdf';
          a.click();
          URL.revokeObjectURL(url);
          status.textContent = 'PDF gerado com sucesso.';
        } else {
          const text = await res.text();
          status.textContent = 'Erro na conversão:';
          errorBox.textContent = text;
        }
      } catch (err) {
        status.textContent = 'Erro de rede.';
        errorBox.textContent = err.message;
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
